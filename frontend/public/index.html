<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Web site created using create-react-app" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>React App</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <!-- Tidio Chat -->
  <script src="//code.tidio.co/zw5z2dfjvocn9b0qe26e8gxrbikcfgqq.js" async></script>

  <!-- Move Lyro AI Above WhatsApp -->
  <script>
    function moveTidio() {
      const interval = setInterval(() => {
        const tidioIframe = document.querySelector('iframe[src*="tidio"]');

        if (tidioIframe) {
          tidioIframe.style.bottom = "200px";
          tidioIframe.style.right = "20px";
          clearInterval(interval);
        }
      }, 500);
    }

    window.addEventListener("load", moveTidio);
  </script>

</body>

</html>
